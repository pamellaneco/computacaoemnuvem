name: CI/CD To-Do List

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Construir a imagem Docker
        run: docker build -t todo-app:ci .
        working-directory: todo-app

      - name: Executar os testes
        run: docker run --rm -e PYTHONPATH=/app todo-app:ci pytest tests/ -v

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar a chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copiar o código para a EC2
        run: |
          rsync -avz --delete --exclude='.git' --exclude='.env' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./todo-app/ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/todo-app/"

      - name: Construir imagem e recarregar os contêineres
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ~/todo-app && docker compose up -d --build"